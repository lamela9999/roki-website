<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>ROKI Migration — Admin</title>
<meta name="robots" content="noindex,nofollow" />
<link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Inter+Tight:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{--cream:#F5EFE6;--paper:#FBF6EC;--ink:#14110F;--muted:#6B6258;--coral:#E8534A;--yellow:#FFDF3D;
  --green:#25E684;--red:#FF5959;--radius:14px;--radius-sm:10px;
  --mono:'JetBrains Mono',ui-monospace,monospace;--sans:'Inter Tight',sans-serif;
  --display:'Archivo Black',sans-serif;--shadow:3px 3px 0 var(--ink)}
*{box-sizing:border-box}
body{margin:0;background:var(--cream);color:var(--ink);font-family:var(--sans);font-size:14px;padding:24px 16px 64px}
.wrap{max-width:1100px;margin:0 auto}
h1{font-family:var(--display);letter-spacing:-.02em}
h1 span{background:var(--yellow);border:1.5px solid var(--ink);border-radius:10px;padding:0 10px;box-shadow:var(--shadow)}
.card{background:var(--paper);border:1.5px solid var(--ink);border-radius:var(--radius);box-shadow:var(--shadow);padding:18px;margin-bottom:20px}
input{font-family:var(--mono);font-size:13px;padding:10px;border:1.5px solid var(--ink);border-radius:var(--radius-sm);width:300px;max-width:100%}
button,a.btn{display:inline-block;font-family:var(--sans);font-weight:800;font-size:12px;text-transform:uppercase;letter-spacing:.06em;
  text-decoration:none;color:#fff;background:var(--coral);border:1.5px solid var(--ink);border-radius:var(--radius-sm);
  box-shadow:var(--shadow);padding:10px 14px;cursor:pointer;margin:4px 6px 4px 0}
button.secondary,a.btn.secondary{background:var(--paper);color:var(--ink)}
table{border-collapse:collapse;width:100%;font-size:12px}
th,td{border:1.5px solid var(--ink);padding:6px 8px;text-align:left;font-family:var(--mono);word-break:break-all}
th{background:var(--ink);color:var(--paper);font-family:var(--sans);text-transform:uppercase;font-size:10px;letter-spacing:.1em}
.stat{display:inline-block;background:var(--yellow);border:1.5px solid var(--ink);border-radius:8px;padding:6px 12px;margin:0 8px 8px 0;font-weight:800}
.warn{background:var(--red);color:#fff;border:1.5px solid var(--ink);border-radius:var(--radius-sm);padding:8px 12px;margin-bottom:12px;font-weight:700;display:none}
h2{font-family:var(--display);font-size:13px;text-transform:uppercase;letter-spacing:.06em;margin:18px 0 8px}
.hidden{display:none}
.tblwrap{overflow-x:auto}
</style>
</head>
<body>
<div class="wrap">
  <h1><span>ADMIN</span> ROKI migration list</h1>

  <div class="card">
    <label style="font-weight:800;text-transform:uppercase;font-size:11px;letter-spacing:.1em">Admin key</label><br>
    <input type="password" id="key" placeholder="admin key">
    <button id="loadBtn">Load</button>
    <button class="secondary" id="rescanBtn">Re-scan chain</button>
  </div>

  <div id="results" class="hidden">
    <div class="warn" id="staleWarn"></div>
    <div class="card">
      <span class="stat" id="statLinked"></span>
      <span class="stat" id="statTotal"></span>
      <span class="stat" id="statUnlinked"></span>
      <span class="stat" id="statDeposited"></span>
      <br>
      <a class="btn" id="csvBtn" href="#">Download CSV</a>
      <a class="btn secondary" id="csvAllBtn" href="#">CSV incl. unregistered</a>
      <span id="scannedAt" style="font-size:11px;color:var(--muted);margin-left:8px"></span>
    </div>

    <div class="card">
      <h2 style="margin-top:0">Registered — send these</h2>
      <div class="tblwrap"><table id="linkedTable">
        <thead><tr><th>#</th><th>Solana wallet</th><th>EVM wallet</th><th>Amount to send</th><th>Txs</th><th>Updated</th></tr></thead>
        <tbody></tbody>
      </table></div>
      <h2>Deposited but not registered yet — chase these people</h2>
      <div class="tblwrap"><table id="unlinkedTable">
        <thead><tr><th>#</th><th>Solana wallet</th><th>Amount deposited</th><th>Txs</th></tr></thead>
        <tbody></tbody>
      </table></div>
    </div>
  </div>
</div>

<script>
(function () {
  var API = '/api/migrate/admin';
  var $ = function (id) { return document.getElementById(id); };
  var keyInput = $('key');
  keyInput.value = localStorage.getItem('rokiMigAdminKey') || '';

  function fmt(n) { return Number(n || 0).toLocaleString('en-US', { maximumFractionDigits: 4 }); }

  async function load(rescan) {
    var key = keyInput.value.trim();
    if (!key) { alert('Enter the admin key'); return; }
    localStorage.setItem('rokiMigAdminKey', key);
    var r = await fetch(API + '?key=' + encodeURIComponent(key) + (rescan ? '&rescan=1' : ''));
    var data = await r.json();
    if (!r.ok) { alert(data.error || 'Failed'); return; }

    $('results').classList.remove('hidden');
    $('staleWarn').style.display = data.stale ? 'block' : 'none';
    $('staleWarn').textContent = data.stale ? ('Showing cached scan — latest re-scan failed: ' + (data.scanError || '')) : '';

    $('statLinked').textContent = data.linked.length + ' registered';
    $('statTotal').textContent = fmt(data.totalLinkedUi) + ' ROKI to send';
    $('statUnlinked').textContent = data.unlinked.length + ' not registered';
    $('statDeposited').textContent = fmt(data.totalDepositedUi) + ' total deposited';
    $('scannedAt').textContent = 'scanned ' + new Date(data.scannedAt).toLocaleString();

    $('csvBtn').href = API + '?format=csv&key=' + encodeURIComponent(key);
    $('csvAllBtn').href = API + '?format=csv&includeUnlinked=1&key=' + encodeURIComponent(key);

    var tb = $('linkedTable').querySelector('tbody');
    tb.innerHTML = '';
    data.linked.forEach(function (s, i) {
      var tr = document.createElement('tr');
      [i + 1, s.solAddress, s.evmAddress, fmt(s.amountUi), s.txCount, (s.updatedAt || '').replace('T', ' ').slice(0, 19)]
        .forEach(function (v) { var td = document.createElement('td'); td.textContent = v; tr.appendChild(td); });
      tb.appendChild(tr);
    });
    var ub = $('unlinkedTable').querySelector('tbody');
    ub.innerHTML = '';
    data.unlinked.forEach(function (c, i) {
      var tr = document.createElement('tr');
      [i + 1, c.wallet, fmt(c.ui), c.txs]
        .forEach(function (v) { var td = document.createElement('td'); td.textContent = v; tr.appendChild(td); });
      ub.appendChild(tr);
    });
  }

  $('loadBtn').onclick = function () { load(false); };
  $('rescanBtn').onclick = async function () {
    this.textContent = 'Scanning…'; this.disabled = true;
    try { await load(true); } finally { this.textContent = 'Re-scan chain'; this.disabled = false; }
  };
  if (keyInput.value) load(false);
})();
</script>
</body>
</html>
